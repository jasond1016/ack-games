<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ACK Games</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <section id="homeView" class="home-view" aria-label="游戏大厅">
        <header class="home-header">
          <p class="brand">ACK Games</p>
          <h1>游戏大厅</h1>
        </header>

        <section class="game-grid" aria-label="游戏列表">
          <button id="vacuumGameCard" class="game-card" type="button">
            <span class="game-card-art" aria-hidden="true">
              <span class="mini-pipe"></span>
              <span class="mini-pipe"></span>
              <span class="mini-pipe"></span>
              <span class="mini-coin"></span>
              <span class="mini-bill"></span>
              <span class="mini-vacuum"></span>
            </span>
            <span class="game-card-copy">
              <span class="game-state">可玩</span>
              <strong>吸尘器接管道</strong>
              <span>60 秒目标 200 分</span>
            </span>
          </button>

          <button id="racingGameCard" class="game-card" type="button">
            <span class="game-card-art racing-card-art" aria-hidden="true">
              <span class="mini-road"></span>
              <span class="mini-road-line"></span>
              <span class="mini-car"></span>
              <span class="mini-tree mini-tree-one"></span>
              <span class="mini-tree mini-tree-two"></span>
            </span>
            <span class="game-card-copy">
              <span class="game-state">可玩</span>
              <strong>3D 赛车</strong>
              <span>三圈竞速对决</span>
            </span>
          </button>

          <article class="game-card game-card-disabled" aria-label="更多游戏">
            <span class="game-card-art empty-art" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
            <span class="game-card-copy">
              <span class="game-state">准备中</span>
              <strong>更多游戏</strong>
              <span>下一款加入这里</span>
            </span>
          </article>
        </section>
      </section>

      <section id="vacuumView" class="game-view vacuum-view" aria-label="吸尘器接管道" hidden>
        <header class="topbar">
          <button id="vacuumHomeButton" class="icon-button" type="button" aria-label="返回首页" title="返回首页">
            ‹
          </button>
          <h1>吸尘器接管道</h1>
          <button id="vacuumRestartButton" class="icon-button" type="button" aria-label="再来一次" title="再来一次">
            ↻
          </button>
        </header>

        <section class="hud" aria-label="游戏状态">
          <div>
            <span>分数</span>
            <strong id="vacuumScoreValue">0</strong>
          </div>
          <div>
            <span>时间</span>
            <strong id="vacuumTimeValue">60</strong>
          </div>
          <div>
            <span>目标</span>
            <strong id="vacuumTargetValue">200</strong>
          </div>
          <div>
            <span>状态</span>
            <strong id="vacuumStatusValue">游戏中</strong>
          </div>
        </section>

        <canvas id="vacuumCanvas" class="game-canvas vacuum-canvas" width="640" height="760" aria-label="吸尘器接管道游戏画面"></canvas>
      </section>

      <section id="racingView" class="game-view racing-view" aria-label="3D 赛车" hidden>
        <header class="topbar">
          <button id="racingHomeButton" class="icon-button" type="button" aria-label="返回首页" title="返回首页">
            ‹
          </button>
          <h1>3D 赛车</h1>
          <button id="racingResetButton" class="icon-button" type="button" aria-label="重开比赛" title="重开比赛">
            ↻
          </button>
        </header>

        <section class="hud racing-hud" aria-label="赛车状态">
          <div>
            <span>圈数</span>
            <strong id="racingLapValue">1 / 3</strong>
          </div>
          <div>
            <span>名次</span>
            <strong id="racingPlaceValue">第1名</strong>
          </div>
          <div>
            <span>速度</span>
            <strong id="racingSpeedValue">0 km/h</strong>
          </div>
          <div>
            <span>加速</span>
            <strong id="racingBoostValue">剩3次</strong>
          </div>
          <div>
            <span>状态</span>
            <strong id="racingStatusValue">比赛中</strong>
          </div>
        </section>

        <div class="racing-stage">
          <canvas id="racingCanvas" class="racing-canvas" width="960" height="620" aria-label="3D 赛车游戏画面"></canvas>

          <section id="racingResultOverlay" class="race-result-overlay" aria-label="比赛结果" hidden>
            <div id="racingResultCard" class="race-result-card">
              <div id="racingConfetti" class="race-confetti" aria-hidden="true"></div>
              <p id="racingResultTag" class="race-result-tag">比赛结束</p>
              <h2 id="racingResultTitle" class="race-result-title">获胜</h2>
              <p id="racingResultSummary" class="race-result-summary">你率先完成 3 圈。</p>
              <div class="race-result-stats">
                <div>
                  <span>你的圈数</span>
                  <strong id="racingResultPlayerLaps">3 / 3</strong>
                </div>
                <div>
                  <span>对手圈数</span>
                  <strong id="racingResultOpponentLaps">2 / 3</strong>
                </div>
              </div>
              <button id="racingPlayAgainButton" class="race-result-button" type="button">再跑一场</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="game.js"></script>
  </body>
</html>
